<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Games Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app">
      <header class="popup-header">
        <h1 class="popup-title">LinkedIn Games Tracker</h1>
      </header>

      <section id="game-type-selector" class="section" aria-label="Game type selector">
        <select id="game-select" aria-label="Select game type">
          <option value="">All Games</option>
          <option value="pinpoint">Pinpoint</option>
          <option value="queens">Queens</option>
          <option value="crossclimb">Crossclimb</option>
          <option value="tango">Tango</option>
          <option value="wend">Wend</option>
          <option value="patches">Patches</option>
          <option value="zip">Zip</option>
          <option value="sudoku">Sudoku</option>
        </select>
      </section>

      <section id="stats-section" class="section" aria-label="Statistics">
        <h2 class="section-title">Statistics</h2>
        <div id="stats-content"></div>
      </section>

      <section id="sessions-section" class="section" aria-label="Recent sessions">
        <h2 class="section-title">Recent Sessions</h2>
        <div id="sessions-content"></div>
      </section>

      <section id="comparison-section" class="section" aria-label="Friends comparison">
        <h2 class="section-title">Comparison</h2>
        <div id="comparison-content"></div>
      </section>



      <section id="empty-state" class="section hidden" aria-label="Empty state">
        <div class="empty-state-container">
          <p
            class="empty-state-message">No game data yet. Play a LinkedIn game to begin tracking your performance!</p>
        </div>
      </section>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>

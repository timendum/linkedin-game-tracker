<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Balanced shield badge with lowered top vertex -->
  <path d="M256 72 L456 152 L456 304 C456 392 374 450 256 476 C138 450 56 392 56 304 L56 152 Z"
    fill="url(#bg)" />

  <!-- Game controller -->
  <path d="M176 210
           C176 180 198 160 228 160
           H284
           C314 160 336 180 336 210
           L350 260
           C356 282 342 302 319 302
           C305 302 294 295 287 284
           L279 272
           H233
           L225 284
           C218 295 207 302 193 302
           C170 302 156 282 162 260Z"
    fill="#FFFFFF" />

  <!-- Directional pad -->
  <rect x="208" y="205" width="12" height="44" rx="6" fill="#111827" />
  <rect x="192" y="221" width="44" height="12" rx="6" fill="#111827" />

  <!-- Controller buttons -->
  <circle cx="295" cy="218" r="9" fill="#111827" />
  <circle cx="320" cy="243" r="9" fill="#111827" />

  <!-- Tracking path, moved lower to avoid covering the controller -->
  <path d="M176 374 C215 354, 258 334, 304 314"
    fill="none"
    stroke="#22C55E"
    stroke-width="16"
    stroke-linecap="round" />

  <!-- Aligned tracking points -->
  <circle cx="176" cy="374" r="14" fill="#22C55E" />
  <circle cx="240" cy="344" r="14" fill="#22C55E" />
  <circle cx="304" cy="314" r="14" fill="#22C55E" />

  <!-- Arrow continuation, kept below the joypad -->
  <path d="M304 314 L356 288"
    fill="none"
    stroke="#22C55E"
    stroke-width="12"
    stroke-linecap="round" />

  <!-- Arrow head -->
  <path d="M356 288 L342 287 M356 288 L350 301"
    fill="none"
    stroke="#22C55E"
    stroke-width="12"
    stroke-linecap="round" />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 13 13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D4ED8" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="13" height="13" rx="2.5" ry="2.5" fill="url(#bg)" />

  <!-- Compact controller silhouette -->
  <path d="M2.9 4.1
           C3.2 3.4 3.8 3.0 4.6 3.0
           H8.4
           C9.2 3.0 9.8 3.4 10.1 4.1
           L10.65 5.85
           C10.95 6.8 10.3 7.55 9.45 7.25
           L8.3 6.85
           H4.7
           L3.55 7.25
           C2.7 7.55 2.05 6.8 2.35 5.85Z"
    fill="#FFFFFF" />

  <!-- D-pad -->
  <path d="M3.85 5.15 H5.45 M4.65 4.35 V5.95"
    stroke="#111827"
    stroke-width="0.65"
    stroke-linecap="round" />

  <!-- Action buttons -->
  <circle cx="8.25" cy="4.85" r="0.42" fill="#111827" />
  <circle cx="9.35" cy="5.65" r="0.42" fill="#111827" />

  <!-- Tracking arrow -->
  <path d="M3.6 10.6 L5.5 9.5 L7.2 9.95 L9.9 8.4"
    fill="none"
    stroke="#FACC15"
    stroke-width="1.05"
    stroke-linecap="round"
    stroke-linejoin="round" />

  <path d="M9.9 8.4 L9.18 8.4 M9.9 8.4 L9.58 9.05"
    fill="none"
    stroke="#FACC15"
    stroke-width="1.05"
    stroke-linecap="round"
    stroke-linejoin="round" />
</svg>

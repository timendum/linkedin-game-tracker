<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Compact shield badge -->
  <path d="M8 1.8 L14 4.3 V9.4 C14 12.1 11.6 14 8 14.8 C4.4 14 2 12.1 2 9.4 V4.3 Z"
    fill="url(#bg)" />

  <!-- Cleaner compact controller silhouette -->
  <path d="M4.4 6.4
           C4.7 5.7 5.3 5.3 6.1 5.3
           H9.9
           C10.7 5.3 11.3 5.7 11.6 6.4
           L12.15 8.15
           C12.45 9.1 11.8 9.85 10.95 9.55
           L9.8 9.15
           H6.2
           L5.05 9.55
           C4.2 9.85 3.55 9.1 3.85 8.15Z"
    fill="#FFFFFF" />

  <!-- Soft inner separation, improves readability at 16px -->
  <path d="M6.1 5.95 H9.9"
    stroke="#E5E7EB"
    stroke-width="0.45"
    stroke-linecap="round" />

  <!-- Cleaner d-pad -->
  <path d="M5.35 7.45 H6.95 M6.15 6.65 V8.25"
    stroke="#111827"
    stroke-width="0.65"
    stroke-linecap="round" />

  <!-- Cleaner action buttons -->
  <circle cx="9.75" cy="7.15" r="0.42" fill="#111827" />
  <circle cx="10.85" cy="7.95" r="0.42" fill="#111827" />

  <!-- Minimal tracking arrow below controller -->
  <path d="M5.1 11.45 L7 10.35 L8.7 10.8 L11.4 9.25"
    fill="none"
    stroke="#22C55E"
    stroke-width="1.05"
    stroke-linecap="round"
    stroke-linejoin="round" />

  <path d="M11.4 9.25 L10.68 9.25 M11.4 9.25 L11.08 9.9"
    fill="none"
    stroke="#22C55E"
    stroke-width="1.05"
    stroke-linecap="round"
    stroke-linejoin="round" />
</svg>
